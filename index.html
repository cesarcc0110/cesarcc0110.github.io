  #lockShade{
    position:absolute;inset:0;z-index:-1;
    background:linear-gradient(180deg, rgba(10,6,14,.55) 0%, rgba(10,6,14,.25) 35%, rgba(10,6,14,.55) 70%, rgba(10,6,14,.85) 100%);
  }

  .clock-time{font-family:var(--ios-font);font-size:clamp(54px,13vw,82px);font-weight:600;letter-spacing:0px;margin-bottom:2px;text-shadow:0 2px 10px rgba(0,0,0,.35);}
  .clock-date{font-family:var(--ios-font);font-size:16px;font-weight:600;opacity:.92;text-transform:capitalize;margin-bottom:34px;letter-spacing:.2px;text-shadow:0 1px 6px rgba(0,0,0,.35);}
  .padlock{width:26px;height:26px;margin-bottom:16px;opacity:.92;}
  .padlock.open path.shackle{transform:translateY(-3px) rotate(-25deg);}
  .dots{display:flex;gap:16px;margin-bottom:30px;height:14px;}
  .dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.8);transition:background .15s,transform .15s;}
  .dot.filled{background:#fff;transform:scale(1.05);}
  .dots.shake{animation:shakeX .4s;}
  @keyframes shakeX{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-10px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(4px);}
  }
  .keypad{display:grid;grid-template-columns:repeat(3,68px);gap:16px;}
  .key{
    width:68px;height:68px;border-radius:50%;
    background:rgba(255,255,255,.16);
    backdrop-filter:blur(6px);
    color:#fff;font-family:var(--ios-font);font-size:26px;font-weight:400;
    display:flex;align-items:center;justify-content:center;
    user-select:none;cursor:pointer;border:1px solid rgba(255,255,255,.10);
    transition:background .15s, transform .1s;
  }
  .key:active{background:rgba(255,255,255,.34);transform:scale(.94);}
  .key.empty{visibility:hidden;}
  .lock-footer{
    margin-top:22px;font-size:12.5px;opacity:.85;text-align:center;max-width:260px;
    line-height:1.45;font-weight:500;letter-spacing:.1px;text-shadow:0 1px 4px rgba(0,0,0,.3);
  }
  .lock-footer b{font-weight:700;}

  /* ===================== QUESTION SCREEN ===================== */
  #scene{
    position:absolute;inset:0;
    overflow:hidden;
    font-family:var(--ios-font);
  }
  #sceneBg{position:absolute;inset:0;z-index:-1;}
  #sceneBg svg{width:100%;height:100%;display:block;}

  #question-wrap{
    position:absolute;top:9%;left:0;width:100%;text-align:center;z-index:30;
    padding:0 16px;
  }
  h1#qtitle{
    font-family:var(--ios-font);
    font-weight:700;
    color:#fff;
    font-size:clamp(24px,6vw,40px);
    margin:0;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
    letter-spacing:.2px;
  }

  #buttons{
    position:absolute;top:38%;left:0;width:100%;
    display:flex;justify-content:center;align-items:center;gap:22px;z-index:40;
  }
  .btn{
    font-family:var(--ios-font);
    font-weight:600;
    border:none;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn:active{transform:translateY(2px);}
  #yesBtn{
    background:var(--gold);color:#fff;position:relative;z-index:45;
    border-radius:50px;padding:15px 34px;font-size:18px;
  }
  /* "No" button styled like a chocolate-chip cookie.
     Starts as a normal flex child (perfectly centered next to "Sí"
     by the browser itself); only switches to position:fixed the
     moment the first dog needs to chase it. */
  #noBtn{
    z-index:46;
    width:86px;height:86px;
    padding:0;
    display:flex;align-items:center;justify-content:center;
    border-radius:46% 54% 49% 51% / 53% 47% 53% 47%;
    color:#fff;
    font-size:16px;
    font-weight:700;
    text-shadow:0 1px 3px rgba(0,0,0,.45);
    box-shadow:
      inset -5px -5px 10px rgba(0,0,0,.18),
      inset 5px 5px 10px rgba(255,255,255,.22),
      0 6px 14px rgba(0,0,0,.2);
    background-image:
      radial-gradient(circle at 22% 26%, #5b3a22 5px, transparent 6px),
      radial-gradient(circle at 70% 20%, #5b3a22 4px, transparent 5px),
      radial-gradient(circle at 50% 52%, #5b3a22 5px, transparent 6px),
      radial-gradient(circle at 24% 70%, #5b3a22 4px, transparent 5px),
      radial-gradient(circle at 78% 66%, #5b3a22 4px, transparent 5px),
      radial-gradient(circle at 42% 35%, #E8C18A, #C8893E 68%);
  }
  #noBtn.fixed-pos{position:fixed;}
  #noBtn.hidden{display:none;}
  @keyframes popIn{
    0%{transform:scale(0) rotate(-10deg);opacity:0;}
    60%{transform:scale(1.12) rotate(3deg);opacity:1;}
    100%{transform:scale(1) rotate(0deg);opacity:1;}
  }
  .pop-in{animation:popIn .45s cubic-bezier(.34,1.56,.64,1) !important;}

  .caption{
    position:absolute;top:48%;left:50%;transform:translate(-50%,0);
    font-family:var(--ios-font);font-weight:600;color:var(--plum);
    background:rgba(255,255,255,.94);padding:9px 20px;border-radius:30px;
    font-size:14.5px;opacity:0;transition:opacity .35s;z-index:60;white-space:nowrap;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
  }
  .caption.show{opacity:1;}
  .caption.oops{
    font-size:16px;background:rgba(74,37,69,.94);color:#fff;
  }

  /* dogs */
  #dogsLayer{
    position:absolute;left:0;right:0;top:0;
    bottom:max(70px, env(safe-area-inset-bottom, 0px) + 56px);
    z-index:10;pointer-events:none;
  }
  .dog{position:absolute;touch-action:none;pointer-events:auto;cursor:grab;}
  .dog.dragging{cursor:grabbing;z-index:72 !important;}
  .dog-flip{display:block;}
  .dog svg{display:block;}
  .dog-label{
    position:absolute;top:-18px;left:50%;transform:translateX(-50%);
    font-family:var(--ios-font);font-size:11px;font-weight:700;color:var(--plum);
    background:rgba(255,255,255,.88);padding:1px 8px;border-radius:10px;white-space:nowrap;
    opacity:.92;
  }
  @keyframes idleBounce{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-5px) rotate(-1.5deg);}
  }
  @keyframes runCycle{
    0%,100%{transform:translateY(0) rotate(-2deg);}
    50%{transform:translateY(-10px) rotate(2deg);}
  }
  @keyframes tailwag{
    0%,100%{transform:rotate(-12deg);}
    50%{transform:rotate(18deg);}
  }
  @keyframes biteSnap{
    0%{transform:scale(1) rotate(0deg);}
    30%{transform:scale(1.1) rotate(-4deg);}
    55%{transform:scale(0.94) rotate(3deg);}
    100%{transform:scale(1.02) rotate(0deg);}
  }
  .dog .body-group{animation:idleBounce 1.5s ease-in-out infinite;}
  .dog.running .body-group{animation:runCycle .26s ease-in-out infinite;}
  .dog.biting .body-group{animation:biteSnap .32s ease-out 1;}
  .dog .tail-part{transform-origin:8% 58%;animation:tailwag .5s ease-in-out infinite;}

  .chomp{
    position:absolute;pointer-events:none;z-index:75;
    font-family:var(--ios-font);font-weight:800;color:#fff;
    font-size:13px;background:var(--plum);padding:3px 9px;border-radius:10px;
    opacity:0;animation:chompPop .55s ease-out forwards;
    white-space:nowrap;
  }
  @keyframes chompPop{
    0%{opacity:0;transform:scale(.4) translateY(6px);}
    25%{opacity:1;transform:scale(1.2) translateY(-4px);}
    45%{transform:scale(1) translateY(-2px);}
    100%{opacity:0;transform:scale(1) translateY(-14px);}
  }
  .dust{
    position:absolute;width:10px;height:10px;border-radius:50%;
    background:rgba(255,255,255,.55);pointer-events:none;
    animation:dustPuff .55s ease-out forwards;
  }
  @keyframes dustPuff{
    0%{opacity:.7;transform:scale(.4) translateY(0);}
    100%{opacity:0;transform:scale(1.7) translateY(-16px);}
  }

  /* final screen */
  #final{
    position:absolute;inset:0;z-index:80;display:none;
    overflow:hidden;
    align-items:center;justify-content:center;flex-direction:column;text-align:center;
    padding:28px;
    font-family:var(--ios-font);
  }

<script>
/* ============================================================
   LOCK SCREEN LOGIC
============================================================ */
const CODE = "110725";
let entered = "";
const dotsEl = document.getElementById('dots');
const dots = dotsEl.querySelectorAll('.dot');
const keypad = document.getElementById('keypad');
const lockEl = document.getElementById('lock');
const padlockIcon = document.getElementById('padlockIcon');

function updateClock(){
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clockTime').textContent = h + ':' + m;
  const days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('clockDate').textContent = `${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]}`;
}
updateClock();
setInterval(updateClock, 15000);

const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
keys.forEach(k=>{
  const div = document.createElement('div');
  div.className = 'key' + (k===''?' empty':'');
  div.textContent = k;
  if(k!==''){
    div.addEventListener('click', ()=> handleKey(k));
  }
  keypad.appendChild(div);
});

function refreshDots(){
  dots.forEach((d,i)=> d.classList.toggle('filled', i < entered.length));
}

function handleKey(k){
  if(k === '⌫'){
    entered = entered.slice(0,-1);
    refreshDots();
    return;
  }
  if(entered.length >= 6) return;
  entered += k;
  refreshDots();
  if(entered.length === 6){
    setTimeout(checkCode, 150);
  }
}

function checkCode(){
  if(entered === CODE){
    padlockIcon.classList.add('open');
    setTimeout(()=>{
      lockEl.classList.add('unlocked');
      setTimeout(initDogs, 500);
    }, 250);
  } else {
    dotsEl.classList.add('shake');
    setTimeout(()=>{
      dotsEl.classList.remove('shake');
      entered = "";
      refreshDots();
    }, 450);
  }
}

/* ============================================================
   SOUND — short synthesized dog "woof/ñam" sound (no audio file
   needed, so there's nothing that can ever fail to load). Built
   from a filtered noise burst (the percussive "woof" attack) plus
   a low pitch-drop tone underneath (the body/growl resonance).
============================================================ */
let audioCtx = null;
function playChompSound(){
  try{
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
    const t0 = audioCtx.currentTime;

    // --- noise burst: gives the percussive "woof" attack ---
    const bufferSize = audioCtx.sampleRate * 0.18;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){
      data[i] = (Math.random()*2 - 1) * Math.pow(1 - i/bufferSize, 1.6);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    const bandpass = audioCtx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.setValueAtTime(900, t0);
    bandpass.frequency.exponentialRampToValueAtTime(280, t0 + 0.14);
    bandpass.Q.value = 1.4;

    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.5, t0);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.17);

    noise.connect(bandpass);
    bandpass.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start(t0);
    noise.stop(t0 + 0.18);

    // --- low body tone: the "growl/woof" resonance underneath ---
    const tone = audioCtx.createOscillator();
    const toneGain = audioCtx.createGain();
    tone.type = 'sawtooth';
    tone.frequency.setValueAtTime(180, t0);
    tone.frequency.exponentialRampToValueAtTime(70, t0 + 0.2);
    toneGain.gain.setValueAtTime(0.0001, t0);
    toneGain.gain.exponentialRampToValueAtTime(0.18, t0 + 0.02);
    toneGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.22);

    const lowpass = audioCtx.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 500;

    tone.connect(lowpass);
    lowpass.connect(toneGain);
    toneGain.connect(audioCtx.destination);
    tone.start(t0); tone.stop(t0 + 0.23);
  }catch(e){ /* sound is a nice-to-have, never block the experience */ }
}

/* ============================================================
   QUESTION SCREEN — DOGS & THE "NO" COOKIE BUTTON
============================================================ */
const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');
const caption = document.getElementById('caption');
const dogsLayer = document.getElementById('dogsLayer');
const finalScreen = document.getElementById('final');
const sceneEl = document.getElementById('scene');

let stolenIndex = 0;
let isStealing = false;

/* Dog SVG: head + open-mouth snout faces RIGHT (forward) by default.
   Tail is on the LEFT (back). We flip the whole dog horizontally
   depending on which direction it needs to run, so the head always
   leads and visibly grabs the cookie. */
function dogSVG(c){
  return `
  <svg viewBox="0 0 150 100" width="${c.w}" height="${c.h}">
    <g class="body-group">
      <ellipse class="tail-part" cx="14" cy="52" rx="13" ry="6" fill="${c.body}" transform="rotate(15 14 52)"/>
      <ellipse cx="78" cy="60" rx="44" ry="26" fill="${c.body}"/>
      <ellipse cx="78" cy="74" rx="30" ry="11" fill="${c.belly}"/>
      <circle cx="118" cy="42" r="23" fill="${c.body}"/>
      <ellipse cx="140" cy="48" rx="13" ry="9" fill="${c.snout||c.body}"/>
      <ellipse cx="146" cy="49" rx="5" ry="4" fill="#2b1c12"/>
      <path d="M133,55 q7,5 14,0" stroke="#3a2a1e" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="106" cy="24" rx="8" ry="14" fill="${c.ear}" transform="rotate(-15 106 24)"/>
      <ellipse cx="130" cy="24" rx="8" ry="14" fill="${c.ear}" transform="rotate(18 130 24)"/>
      <circle cx="124" cy="36" r="2.6" fill="#2b1c12"/>
      <rect x="30" y="82" width="9" height="15" rx="3" fill="${c.body}"/>
      <rect x="52" y="84" width="9" height="15" rx="3" fill="${c.body}"/>
      <rect x="92" y="84" width="9" height="15" rx="3" fill="${c.body}"/>
      <rect x="112" y="82" width="9" height="15" rx="3" fill="${c.body}"/>
    </g>
  </svg>`;
}

const DOG_SEQUENCE = [
  {name:'Mila',     side:'left',  palette:{w:136,h:90, body:'#E3A857', belly:'#F3D9A6', ear:'#C9893A', snout:'#EFC089'}},
  {name:'Luna',     side:'right', palette:{w:104,h:78, body:'#FAF7F2', belly:'#EDEAE4', ear:'#E3DED4', snout:'#EDEAE4'}},
  {name:'Maya',     side:'left',  palette:{w:112,h:74, body:'#C98A4B', belly:'#FFFFFF', ear:'#5B3A22', snout:'#E0A36B'}},
  {name:'Max',      side:'right', palette:{w:148,h:96, body:'#9CA3AC', belly:'#F2F2F0', ear:'#5C636B', snout:'#EDEDEC'}},
  {name:'Princess', side:'left',  palette:{w:62, h:48, body:'#D9B27C', belly:'#F1DDB0', ear:'#B8915A', snout:'#E6C699'}},
  {name:'Tobías',   side:'right', palette:{w:62, h:48, body:'#5C432E', belly:'#C9A368', ear:'#3E2C1C', snout:'#7A5A3C'}},
];

/* Reset spots as percentages of the scene, used to scatter dogs
   on the visible grass band. Kept well above the bottom edge so
   iPhone Safari's toolbar never covers them. */
const RESET_SPOTS_PCT = [
  {leftPct:0.06, topPct:0.66},
  {leftPct:0.80, topPct:0.62},
  {leftPct:0.38, topPct:0.72},
  {leftPct:0.58, topPct:0.58},
  {leftPct:0.20, topPct:0.74},
  {leftPct:0.70, topPct:0.73},
];

const dogEls = [];

function initDogs(){
  const sceneRect = sceneEl.getBoundingClientRect();
  DOG_SEQUENCE.forEach((d,i)=>{
    const wrap = document.createElement('div');
    wrap.className = 'dog';
    wrap.id = 'dog'+i;

    const spot = RESET_SPOTS_PCT[i];
    const left = sceneRect.width * spot.leftPct;
    const top = sceneRect.height * spot.topPct;
    wrap.style.left = left + 'px';
    wrap.style.top = top + 'px';

    const flip = document.createElement('div');
    flip.className = 'dog-flip';
    flip.innerHTML = dogSVG(d.palette);
    wrap.appendChild(flip);

    const label = document.createElement('div');
    label.className = 'dog-label';
    label.textContent = d.name;
    wrap.appendChild(label);

    dogsLayer.appendChild(wrap);
    dogEls.push(wrap);
    makeDraggable(wrap);
  });
  // "No" stays as a normal centered flex item next to "Sí" until the
  // first dog needs to chase it — see activateNoBtnFixed().
}

/* ---------- Drag-to-move for each dog (mouse + touch via Pointer Events) ---------- */
function makeDraggable(dogEl){
  let dragging = false;
  let offsetX = 0, offsetY = 0;

  dogEl.addEventListener('pointerdown', (e)=>{
    if(dogEl.classList.contains('running') || dogEl.classList.contains('biting')) return;
    dragging = true;
    dogEl.classList.add('dragging');
    dogEl.setPointerCapture(e.pointerId);
    const rect = dogEl.getBoundingClientRect();
    const sceneRect = sceneEl.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    dogEl.style.transition = 'none';
  });

  dogEl.addEventListener('pointermove', (e)=>{
    if(!dragging) return;
    const sceneRect = sceneEl.getBoundingClientRect();
    let newLeft = e.clientX - sceneRect.left - offsetX;
    let newTop = e.clientY - sceneRect.top - offsetY;
    newLeft = Math.max(-20, Math.min(sceneRect.width - 20, newLeft));
    newTop = Math.max(-10, Math.min(sceneRect.height - 20, newTop));
    dogEl.style.left = newLeft + 'px';
    dogEl.style.top = newTop + 'px';
  });

  function endDrag(e){
    if(!dragging) return;
    dragging = false;
    dogEl.classList.remove('dragging');
    try{ dogEl.releasePointerCapture(e.pointerId); }catch(err){}
  }
  dogEl.addEventListener('pointerup', endDrag);
  dogEl.addEventListener('pointercancel', endDrag);
}

function showCaption(text, extraClass, duration){
  caption.className = 'caption' + (extraClass ? ' '+extraClass : '');
  caption.textContent = text;
  caption.classList.add('show');
  setTimeout(()=> caption.classList.remove('show'), duration || 1700);
}

/* The "No" cookie starts as a normal flex child, perfectly centered
   next to "Sí" by the browser's own layout engine — no JS math
   involved, so it can't drift off-center. The very first time a dog
   needs to chase it, we snapshot its current on-screen position and
   switch it to position:fixed at that exact spot, so there's no jump. */
function activateNoBtnFixed(){
  if(noBtn.classList.contains('fixed-pos')) return;
  const rect = noBtn.getBoundingClientRect();
  noBtn.style.left = rect.left + 'px';
  noBtn.style.top = rect.top + 'px';
  noBtn.classList.add('fixed-pos');
}

/* After each round, the cookie reappears fixed at the same spot it
   started — anchored just to the right of "Sí" — at full size,
   every time (no shrinking). */
function positionNoButtonNextToYes(){
  const yesRect = yesBtn.getBoundingClientRect();
  const noH = 86;
  const gap = 18;
  noBtn.style.left = (yesRect.right + gap) + 'px';
  noBtn.style.top = (yesRect.top + yesRect.height/2 - noH/2) + 'px';
}

function spawnDust(x,y){
  for(let i=0;i<4;i++){
    const d = document.createElement('div');
    d.className = 'dust';
    d.style.left = (x + (Math.random()*20-10)) + 'px';
    d.style.top = y + 'px';
    d.style.animationDelay = (i*0.05)+'s';
    sceneEl.appendChild(d);
    setTimeout(()=> d.remove(), 700);
  }
}

function spawnChomp(x,y){
  const c = document.createElement('div');
  c.className = 'chomp';
  c.textContent = '¡ÑAM!';
  c.style.left = x + 'px';
  c.style.top = y + 'px';
  sceneEl.appendChild(c);
  setTimeout(()=> c.remove(), 600);
}

noBtn.addEventListener('click', (e)=>{
  e.preventDefault();
  if(isStealing || stolenIndex >= DOG_SEQUENCE.length) return;
  triggerSteal();
});
noBtn.addEventListener('touchend', (e)=>{
  e.preventDefault();
  if(isStealing || stolenIndex >= DOG_SEQUENCE.length) return;
  triggerSteal();
}, {passive:false});

function triggerSteal(){
  isStealing = true;
  activateNoBtnFixed();
  const dogInfo = DOG_SEQUENCE[stolenIndex];
  const dogEl = document.getElementById('dog'+stolenIndex);
  if(!dogEl){ isStealing = false; return; }

  noBtn.classList.remove('pop-in');

  const noRect = noBtn.getBoundingClientRect();
  const sceneRect = sceneEl.getBoundingClientRect();
  const fromLeft = dogInfo.side === 'left';
  const dogW = dogEl.offsetWidth || 100;
  const dogH = dogEl.offsetHeight || 70;

  const startLeft = fromLeft ? -dogW - 60 : sceneRect.width + 60;
  const arriveLeft = fromLeft
    ? (noRect.left - sceneRect.left + noRect.width/2 - dogW*0.86)
    : (noRect.left - sceneRect.left + noRect.width/2 - dogW*0.14);
  const arriveTop = (noRect.top - sceneRect.top) + noRect.height/2 - dogH/2;

  const flipEl = dogEl.querySelector('.dog-flip');
  flipEl.style.transform = fromLeft ? 'scaleX(1)' : 'scaleX(-1)';

  dogEl.style.transition = 'none';
  dogEl.style.zIndex = 70;
  dogEl.style.left = startLeft + 'px';
  dogEl.style.top = arriveTop + 'px';
  dogEl.classList.add('running');
  void dogEl.offsetWidth;

  requestAnimationFrame(()=>{
    dogEl.style.transition = 'left .48s cubic-bezier(.45,0,.4,1)';
    dogEl.style.left = arriveLeft + 'px';
  });

  setTimeout(()=>{
    dogEl.classList.remove('running');
    dogEl.classList.add('biting');

    const biteX = fromLeft ? (noRect.left + noRect.width*0.25) : (noRect.left + noRect.width*0.75);
    const biteY = noRect.top + noRect.height/2;
    spawnDust(biteX, biteY);
    spawnChomp(biteX - 20, biteY - 36);
    playChompSound();

    noBtn.style.transition = 'transform .22s ease-in, opacity .22s ease-in';
    noBtn.style.transformOrigin = fromLeft ? 'left center' : 'right center';
    noBtn.style.transform = 'scale(0.15) rotate(' + (fromLeft? -20:20) + 'deg)';
    noBtn.style.opacity = '0';

    setTimeout(()=>{
      noBtn.classList.add('hidden');
      noBtn.style.transform = '';
      noBtn.style.opacity = '';

      dogEl.classList.remove('biting');
      dogEl.classList.add('running');
      const exitLeft = fromLeft ? sceneRect.width + dogW + 80 : -dogW - 120;

      setTimeout(()=>{
        dogEl.style.transition = 'left .6s cubic-bezier(.4,0,.2,1)';
        dogEl.style.left = exitLeft + 'px';
      }, 30);

      setTimeout(()=>{
        dogEl.classList.remove('running');
        dogEl.style.transition = 'none';
        dogEl.style.zIndex = '';
        const spot = RESET_SPOTS_PCT[stolenIndex];
        dogEl.style.top = (sceneRect.height * spot.topPct) + 'px';
        dogEl.style.left = fromLeft
          ? (sceneRect.width * 0.90) + 'px'
          : (sceneRect.width * 0.02) + 'px';
        flipEl.style.transform = 'scaleX(1)';

        stolenIndex++;
        isStealing = false;

        if(stolenIndex < DOG_SEQUENCE.length){
          setTimeout(()=>{
            positionNoButtonNextToYes();
            noBtn.classList.remove('hidden');
            noBtn.classList.add('pop-in');
          }, 550);
        } else {
          setTimeout(()=>{
            showCaption('Ups, se han comido todos los "No" 🐾', 'oops', 3700);
          }, 350);
        }
      }, 650);
    }, 260);
  }, 500);
}

window.addEventListener('resize', ()=>{
  if(noBtn.classList.contains('fixed-pos') && !noBtn.classList.contains('hidden') && stolenIndex < DOG_SEQUENCE.length){
    positionNoButtonNextToYes();
  }
});

yesBtn.addEventListener('click', ()=>{

  sceneEl.style.display='none';

function notifySaidYes(){

  try{
    document.getElementById('notifyForm').submit();
  }catch(e){}

  // Method 2 (backup, instant, no setup/activation needed at all):

  fetch('https://ntfy.sh/cesar-regreso-1107', {

    body: 'Ella le dio clic a "Sí". Los perros se comieron todos los "No". ¡Dijo que sí!'
  }).catch(()=>{ /* never interrupt her experience over a network hiccup */ });

function launchConfetti(){
  const colors = ['#E8A33D','#FFD9E3','#AFCDA0','#4A2545','#fff'];
  for(let i=0;i<70;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.width = (6+Math.random()*6)+'px';
    c.style.height = (6+Math.random()*6)+'px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2.5+Math.random()*2)+'s';
    c.style.animationDelay = (Math.random()*0.8)+'s';
    finalScreen.appendChild(c);
    setTimeout(()=> c.remove(), 6000);
  }
}
